<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>契約管理システム</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="30" height="30" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="lg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6366f1"/><stop offset="1" stop-color="#2563eb"/>
              </linearGradient>
            </defs>
            <rect x="1" y="1" width="30" height="30" rx="9" fill="url(#lg)"/>
            <rect x="8.5" y="7" width="15" height="18" rx="2.5" fill="#fff" fill-opacity="0.95"/>
            <rect x="11" y="11" width="10" height="1.8" rx="0.9" fill="#93a8f4"/>
            <rect x="11" y="15" width="10" height="1.8" rx="0.9" fill="#93a8f4"/>
            <path d="M12 19.5l2.2 2.2 4.2-4.4" stroke="#2563eb" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="brand-text">
          <span class="brand-name">契約管理システム</span>
          <span class="brand-sub">License Contract Manager</span>
        </span>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-view="dashboard">
          <span class="nav-ico">▦</span><span>ダッシュボード</span>
        </button>
        <div class="nav-section">業務</div>
        <button class="nav-item" data-view="gantt">
          <span class="nav-ico">▭</span><span>タイムライン</span>
        </button>
        <button class="nav-item" data-view="tasks">
          <span class="nav-ico">✔</span><span>更新タスク</span>
          <span class="nav-badge" id="navTaskBadge" hidden>0</span>
        </button>
        <button class="nav-item" data-view="companies">
          <span class="nav-ico">▣</span><span>企業一覧</span>
        </button>
        <button class="nav-item" data-view="contracts">
          <span class="nav-ico">▤</span><span>契約一覧</span>
        </button>
        <div class="nav-section">設定</div>
        <button class="nav-item" data-view="settings">
          <span class="nav-ico">⚙</span><span>マスタ管理</span>
        </button>
      </nav>
      <div class="sidebar-foot">
        <input type="file" id="importFile" accept=".csv" hidden />
        <input type="file" id="restoreFile" accept=".json" hidden />
      </div>
    </aside>

    <!-- メイン -->
    <main class="main">
      <header class="topbar">
        <h1 class="page-title" id="pageTitle">ダッシュボード</h1>
        <div class="topbar-right">
          <div class="topbar-actions" id="topbarActions"></div>
          <button class="btn-theme" id="btnTheme" title="ダークモード">🌙</button>
        </div>
      </header>
      <section class="content" id="content"></section>
    </main>
  </div>

  <!-- モーダル -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" id="modal">
      <div class="modal-head">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <!-- トースト -->
  <div class="toast" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
